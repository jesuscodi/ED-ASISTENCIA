<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REY DE REYES</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url('img/fondo-ninos.jpg') center/cover no-repeat;
position:relative;
}

body::before{
content:"";
position:absolute;
inset:0;
background:rgba(255,255,255,0.3);
}

.login-wrapper{
position:relative;
z-index:1;
width:100%;
display:flex;
justify-content:center;
}

.login-container{
background:#fff3e0;
padding:40px;
border-radius:20px;
width:100%;
max-width:400px;
box-shadow:0 10px 25px rgba(0,0,0,.15);
text-align:center;
}

h2{
color:#ff7f50;
margin-bottom:15px;
}

.input-group{
position:relative;
margin-bottom:15px;
}

.input-group i{
position:absolute;
left:12px;
top:50%;
transform:translateY(-50%);
color:#ff7f50;
}

input{
width:100%;
padding:12px 12px 12px 38px;
border-radius:10px;
border:1px solid #ddd;
}

.botones{
display:flex;
gap:10px;
margin-top:15px;
}

button{
flex:1;
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

#btnLogin{
background:#ff7f50;
color:white;
}

#btnRegistro{
background:#858796;
color:white;
}

</style>

</head>

<body>

<div class="login-wrapper">
<div class="login-container">

<h2>ED REY DE REYES 👑</h2>

<p>Ingresa o regístrate</p>

<div class="input-group">
<i class="fa fa-user"></i>
<input type="text" id="nombre" placeholder="Nombre completo">
</div>

<div class="input-group">
<i class="fa fa-envelope"></i>
<input type="email" id="email" placeholder="Correo">
</div>

<div class="input-group">
<i class="fa fa-lock"></i>
<input type="password" id="password" placeholder="Contraseña">
</div>

<div class="botones">
<button id="btnLogin">
<i class="fa fa-sign-in-alt"></i> Ingresar
</button>

<button id="btnRegistro">
<i class="fa fa-user-plus"></i> Registrar
</button>
</div>

</div>
</div>

<script type="module" src="login.js"></script>

</body>
</html>
