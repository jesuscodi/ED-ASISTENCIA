<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
font-family:Segoe UI;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f5f5f5;
}

.login{
background:white;
padding:40px;
border-radius:15px;
width:350px;
text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ddd;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

#btnLogin{
background:#ff7f50;
color:white;
}

#btnRegistro{
background:#858796;
color:white;
}

</style>

</head>

<body>

<div class="login">

<h2>👑 ED REY DE REYES</h2>

<input type="text" id="nombre" placeholder="Nombre">
<input type="email" id="email" placeholder="Correo">
<input type="password" id="password" placeholder="Contraseña">

<button id="btnRegistro">Registrar</button>
<button id="btnLogin">Ingresar</button>

</div>

<script type="module" src="login.js"></script>

</body>
</html>
